<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="en">
<head>
    <title>Edit</title>
</head>
<body>
<div layout:fragment="content">

    <h2 class="esh-body-title">Edit</h2>

    <div class="container">
        <div class="row">
            <img class="col-md-6 esh-picture" th:src="@{'/pics/' + ${catalogItem.pictureFileName}}" alt="product image"/>
            <div class="col-md-6 form-horizontal">

                <form th:action="@{'/catalog/edit/' + ${catalogItem.id}}" th:object="${catalogItem}" method="post">
                    <input type="hidden" th:field="*{id}"/>
                    <input type="hidden" th:field="*{pictureFileName}"/>

                    <div class="form-group">
                        <label class="control-label col-md-4">Name</label>
                        <div class="col-md-8">
                            <input type="text" th:field="*{name}" class="form-control"/>
                            <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"
                                  class="field-validation-valid text-danger"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Description</label>
                        <div class="col-md-8">
                            <input type="text" th:field="*{description}" class="form-control"/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Brand</label>
                        <div class="col-md-8">
                            <select th:field="*{catalogBrandId}" class="form-control">
                                <option th:each="brand : ${brands}"
                                        th:value="${brand.id}"
                                        th:text="${brand.brand}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Type</label>
                        <div class="col-md-8">
                            <select th:field="*{catalogTypeId}" class="form-control">
                                <option th:each="type : ${types}"
                                        th:value="${type.id}"
                                        th:text="${type.type}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Price</label>
                        <div class="col-md-8">
                            <input type="text" th:field="*{price}" class="form-control"/>
                            <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}"
                                  class="text-danger"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Picture name</label>
                        <div class="col-md-8">
                            <input type="text" th:value="${catalogItem.pictureFileName}" class="form-control"
                                   readonly="readonly" title="Not allowed for edition"/>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Stock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{availableStock}" class="form-control"/>
                            <span th:if="${#fields.hasErrors('availableStock')}" th:errors="*{availableStock}"
                                  class="text-danger"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Restock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{restockThreshold}" class="form-control"/>
                            <span th:if="${#fields.hasErrors('restockThreshold')}" th:errors="*{restockThreshold}"
                                  class="text-danger"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Max stock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{maxStockThreshold}" class="form-control"/>
                            <span th:if="${#fields.hasErrors('maxStockThreshold')}" th:errors="*{maxStockThreshold}"
                                  class="text-danger"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-md-12 text-right esh-button-actions">
                            <a th:href="@{/}" class="btn esh-button esh-button-secondary">[ Cancel ]</a>
                            <button type="submit" class="btn esh-button esh-button-primary">[ Save ]</button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>
</body>
</html>
