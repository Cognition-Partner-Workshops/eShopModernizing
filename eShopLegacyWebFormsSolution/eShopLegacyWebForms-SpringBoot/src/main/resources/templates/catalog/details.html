<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}"
      lang="en">
<head>
    <title>Details</title>
</head>
<body>
<div layout:fragment="content">

    <h2 class="esh-body-title">Details</h2>

    <div class="container">
        <div class="row">
            <img class="col-md-6 esh-picture" th:src="@{'/pics/' + ${item.pictureFileName}}" alt="product image"/>
            <dl class="col-md-6 dl-horizontal">
                <dt>Name</dt>
                <dd th:text="${item.name}"></dd>

                <dt>Description</dt>
                <dd th:text="${item.description}"></dd>

                <dt>Brand</dt>
                <dd th:text="${item.catalogBrand?.brand}"></dd>

                <dt>Type</dt>
                <dd th:text="${item.catalogType?.type}"></dd>

                <dt>Price</dt>
                <dd>
                    <span class="esh-price" th:text="${item.price}"></span>
                </dd>

                <dt>Picture name</dt>
                <dd th:text="${item.pictureFileName}"></dd>

                <dt>Stock</dt>
                <dd th:text="${item.availableStock}"></dd>

                <dt>Restock</dt>
                <dd th:text="${item.restockThreshold}"></dd>

                <dt>Max stock</dt>
                <dd th:text="${item.maxStockThreshold}"></dd>
            </dl>
        </div>

        <div class="form-actions no-color esh-link-list">
            <a th:href="@{'/catalog/edit/' + ${item.id}}" class="esh-link-item">Edit</a>
            |
            <a th:href="@{/}" class="esh-link-item">Back to list</a>
        </div>
    </div>

</div>
</body>
</html>
