<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Details</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="esh-body-title">Details</h2>

    <div class="container">
        <div class="row">
            <img class="col-md-6 esh-picture" th:src="${catalogItem.pictureUri}" alt="product" />
            <dl class="col-md-6 dl-horizontal">
                <dt>Name</dt>
                <dd th:text="${catalogItem.name}"></dd>

                <dt>Description</dt>
                <dd th:text="${catalogItem.description}"></dd>

                <dt>Brand</dt>
                <dd th:text="${catalogItem.catalogBrand?.brand}"></dd>

                <dt>Type</dt>
                <dd th:text="${catalogItem.catalogType?.type}"></dd>

                <dt>Price</dt>
                <dd th:text="${catalogItem.price}"></dd>

                <dt>Picture name</dt>
                <dd th:text="${catalogItem.pictureFileName}"></dd>

                <dt>Stock</dt>
                <dd th:text="${catalogItem.availableStock}"></dd>

                <dt>Restock</dt>
                <dd th:text="${catalogItem.restockThreshold}"></dd>

                <dt>Max stock</dt>
                <dd th:text="${catalogItem.maxStockThreshold}"></dd>
            </dl>
        </div>
        <p class="esh-link-list esh-link-item--margin">
            <a th:href="@{/catalog/edit/{id}(id=${catalogItem.id})}" class="esh-link-item">Edit</a> |
            <a th:href="@{/}" class="esh-link-item">Back to List</a>
        </p>
    </div>
</div>
</body>
</html>
