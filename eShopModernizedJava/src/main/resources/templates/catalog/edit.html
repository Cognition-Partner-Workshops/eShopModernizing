<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Edit</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="esh-body-title">Edit</h2>

    <form th:action="@{/catalog/edit/{id}(id=${catalogItem.id})}" th:object="${catalogItem}" method="post">
        <div class="container">
            <div class="row">
                <img class="col-md-6 esh-picture" th:src="${catalogItem.pictureUri}" alt="product" />
                <div class="col-md-6 form-horizontal">
                    <div th:if="${#fields.hasErrors('*')}" class="text-danger">
                        <ul>
                            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                        </ul>
                    </div>
                    <input type="hidden" th:field="*{id}" />
                    <input type="hidden" th:field="*{pictureFileName}" />

                    <div class="form-group">
                        <label class="control-label col-md-4">Name</label>
                        <div class="col-md-8">
                            <input type="text" th:field="*{name}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Description</label>
                        <div class="col-md-8">
                            <input type="text" th:field="*{description}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Brand</label>
                        <div class="col-md-8">
                            <select th:field="*{catalogBrandId}" class="form-control">
                                <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.brand}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Type</label>
                        <div class="col-md-8">
                            <select th:field="*{catalogTypeId}" class="form-control">
                                <option th:each="type : ${types}" th:value="${type.id}" th:text="${type.type}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Price</label>
                        <div class="col-md-8">
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Picture name</label>
                        <div class="col-md-8">
                            <input type="text" th:value="${catalogItem.pictureFileName}" class="form-control" readonly="readonly" title="Not allowed for edition" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Stock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{availableStock}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Restock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{restockThreshold}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="control-label col-md-4">Max stock</label>
                        <div class="col-md-8">
                            <input type="number" th:field="*{maxStockThreshold}" class="form-control" />
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="col-md-12 text-right esh-button-actions">
                            <a th:href="@{/}" class="btn esh-button esh-button-secondary">[ Cancel ]</a>
                            <button type="submit" class="btn esh-button esh-button-primary">[ Save ]</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
<div layout:fragment="scripts">
    <script th:src="@{/webjars/jquery-validation/1.19.1/jquery.validate.min.js}"></script>
</div>
</body>
</html>
