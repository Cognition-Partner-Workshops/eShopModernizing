<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">
    <h1>Error</h1>
    <h2 th:text="${status}"></h2>
    <p th:text="${error}"></p>
    <p th:text="${message}"></p>
    <p>
        <a th:href="@{/}">Back to List</a>
    </p>
</div>
</body>
</html>
