spring:
  application:
    name: eshop-catalog
  jpa:
    open-in-view: false
    hibernate:
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8080
  error:
    whitelabel:
      enabled: false
    path: /error

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    info:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: eShop Legacy MVC catalog manager migrated from .NET to Spring Boot
    version: '@project.version@'
    java-version: ${java.version}
    spring-boot-version: '@project.parent.version@'

app:
  catalog:
    use-mock-data: true
    use-customization-data: false
