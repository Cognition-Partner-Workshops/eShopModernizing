spring:
  datasource:
    url: ${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=CatalogDb;encrypt=true;trustServerCertificate=true}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

app:
  catalog:
    use-mock-data: false
    use-customization-data: false

management:
  endpoint:
    health:
      show-details: when-authorized
  info:
    os:
      enabled: false

logging:
  level:
    com.eshop.catalog: INFO
    org.springframework: WARN
