<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Error</title>
</head>
<body>
<div layout:fragment="content">
    <section class="esh-catalog-hero">
        <div class="container">
            <h1>Error</h1>
            <h2 th:text="${message != null ? message : 'An error occurred while processing your request.'}">An error occurred while processing your request.</h2>
            <p th:if="${status != null}" th:text="'Status: ' + ${status}"></p>
            <a th:href="@{/}" class="btn btn-primary">Back to catalog</a>
        </div>
    </section>
    <div th:if="${#environment.acceptsProfiles('dev')}">
        <hr />
        <h3>Development Error Details</h3>
        <dl>
            <dt>Error</dt>
            <dd th:text="${error}" />
            <dt>Path</dt>
            <dd th:text="${path}" />
            <dt>Timestamp</dt>
            <dd th:text="${timestamp}" />
        </dl>
        <p th:if="${trace}" style="white-space: pre-wrap; font-size: 0.8em;" th:text="${trace}"></p>
    </div>
</div>
</body>
</html>
