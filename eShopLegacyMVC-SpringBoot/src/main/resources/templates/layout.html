<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' - Catalog manager (MVC)'">Catalog manager (MVC)</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{/css/base.css}" rel="stylesheet" />
    <link th:href="@{/css/Site.css}" rel="stylesheet" />
    <link th:href="@{/css/custom.css}" rel="stylesheet" />
    <script th:src="@{/js/modernizr-2.8.3.js}"></script>
</head>
<body>
    <header class="navbar navbar-light navbar-static-top">
        <div class="esh-header-brand">
            <a th:href="@{/}">
                <img th:src="@{/images/brand.png}" />
            </a>
        </div>
    </header>
    <section class="esh-app-hero">
        <div class="container esh-header">
            <h1 class="esh-header-title">Catalog manager <span>(MVC)</span></h1>
        </div>
    </section>

    <div layout:fragment="content"></div>

    <footer class="esh-app-footer">
        <div class="container">
            <article class="row">
                <section class="col-sm-6">
                    <img class="esh-app-footer-brand" th:src="@{/images/brand_dark.png}" />
                </section>
                <section class="col-sm-6">
                    <img class="esh-app-footer-text hidden-xs" th:src="@{/images/main_footer_text.png}" width="335" height="26" alt="footer text image" />
                    <br />
                    <small th:text="${sessionInfo}"></small>
                </section>
            </article>
        </div>
    </footer>

    <script th:src="@{/js/jquery-3.3.1.min.js}"></script>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <div layout:fragment="scripts"></div>
</body>
</html>
