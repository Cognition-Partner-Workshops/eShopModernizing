<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} ? ${pageTitle} + ' - Catalog manager (MVC)' : 'Catalog manager (MVC)'">Catalog manager (MVC)</title>

    <!-- Bootstrap CSS (WebJar) -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/4.1.3/css/bootstrap.min.css}" />
    <!-- Font Awesome (WebJar) -->
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/5.15.4/css/all.min.css}" />
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/base.css}" />
    <link rel="stylesheet" th:href="@{/css/custom.css}" />
    <link rel="stylesheet" th:href="@{/css/Site.css}" />
</head>
<body>
    <header class="navbar navbar-light navbar-static-top">
        <div class="esh-header-brand">
            <a th:href="@{/}">
                <img th:src="@{/images/brand.png}" alt="eShop brand" />
            </a>
        </div>
    </header>

    <section class="esh-app-hero">
        <div class="container esh-header">
            <h1 class="esh-header-title">Catalog manager <span>(MVC)</span></h1>
        </div>
    </section>

    <div layout:fragment="content"></div>

    <footer class="esh-app-footer">
        <div class="container">
            <article class="row">
                <section class="col-sm-6">
                    <img class="esh-app-footer-brand" th:src="@{/images/brand_dark.png}" alt="eShop brand" />
                </section>
                <section class="col-sm-6">
                    <img class="esh-app-footer-text hidden-xs" th:src="@{/images/main_footer_text.png}"
                         width="335" height="26" alt="footer text image" />
                    <br />
                    <small th:text="${#strings.defaultString(machineName, 'localhost') + ', ' + #strings.defaultString(sessionStartTime, '')}">
                        localhost
                    </small>
                </section>
            </article>
        </div>
    </footer>

    <!-- jQuery (WebJar) -->
    <script th:src="@{/webjars/jquery/3.3.1/jquery.min.js}"></script>
    <!-- Popper.js (WebJar) -->
    <script th:src="@{/webjars/popper.js/1.14.3/umd/popper.min.js}"></script>
    <!-- Bootstrap JS (WebJar) -->
    <script th:src="@{/webjars/bootstrap/4.1.3/js/bootstrap.min.js}"></script>
    <!-- Page-specific scripts -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
