apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshop-catalog
  labels:
    app.kubernetes.io/name: eshop-catalog
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/managed-by: kubectl
    platform/environment: production
    platform/team: migration
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: eshop-catalog
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: eshop-catalog
        app.kubernetes.io/part-of: eshop
        platform/environment: production
        platform/team: migration
    spec:
      containers:
        - name: eshop-catalog
          image: eshop-catalog:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: eshop-catalog-config
                  key: SPRING_PROFILES_ACTIVE
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: eshop-catalog-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: eshop-catalog-secret
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: eshop-catalog-secret
                  key: DB_PASSWORD
            - name: USE_MOCK_DATA
              valueFrom:
                configMapKeyRef:
                  name: eshop-catalog-config
                  key: USE_MOCK_DATA
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
