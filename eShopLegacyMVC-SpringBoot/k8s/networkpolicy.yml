apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eshop-catalog
  labels:
    app.kubernetes.io/name: eshop-catalog
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/managed-by: kubectl
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: eshop-catalog
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
