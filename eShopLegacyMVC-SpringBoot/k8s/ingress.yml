apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-catalog
  labels:
    app.kubernetes.io/name: eshop-catalog
    app.kubernetes.io/part-of: eshop
    app.kubernetes.io/managed-by: kubectl
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - eshop-catalog.example.com
      secretName: eshop-catalog-tls
  rules:
    - host: eshop-catalog.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eshop-catalog
                port:
                  number: 80
