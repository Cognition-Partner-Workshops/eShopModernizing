<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Catalog manager (MVC)">Catalog manager</title>
    <link th:href="@{/Content/bootstrap.min.css}" rel="stylesheet" />
    <link th:href="@{/Content/custom.css}" rel="stylesheet" />
    <link th:href="@{/Content/base.css}" rel="stylesheet" />
    <link th:href="@{/Content/Site.css}" rel="stylesheet" />
</head>
<body>
    <header class="navbar navbar-light navbar-static-top">
        <div class="esh-header-brand">
            <a th:href="@{/catalog}">
                <img src="/images/brand.png" />
            </a>
        </div>
    </header>
    <section class="esh-app-hero">
        <div class="container esh-header">
            <h1 class="esh-header-title">Catalog manager <span>(MVC)</span></h1>
        </div>
    </section>

    <div layout:fragment="content"></div>

    <footer class="esh-app-footer">
        <div class="container">
            <article class="row">
                <section class="col-sm-6">
                    <img class="esh-app-footer-brand" src="/images/brand_dark.png" />
                </section>
                <section class="col-sm-6">
                    <img class="esh-app-footer-text hidden-xs" src="/images/main_footer_text.png" width="335" height="26" alt="footer text image" />
                    <br />
                    <small th:text="${session != null ? session.getAttribute('MachineName') + ', ' + session.getAttribute('SessionStartTime') : ''}"></small>
                </section>
            </article>
        </div>
    </footer>

    <script th:src="@{/Scripts/jquery-3.3.1.min.js}"></script>
    <script th:src="@{/Scripts/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/Scripts/jquery.validate.min.js}"></script>
    <script th:src="@{/Scripts/jquery.validate.unobtrusive.min.js}"></script>
</body>
</html>
