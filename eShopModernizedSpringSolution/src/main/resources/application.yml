spring:
  application:
    name: eshop-modernized
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=eShopDb;encrypt=false
    username: sa
    password: ${DB_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: user
      password: ${SECURITY_PASSWORD:password}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  use-mock-data: false
  use-customization-data: false
