spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://sql.data:1433;databaseName=eShopDatabase;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    show-sql: false
  flyway:
    locations: classpath:db/migration/sqlserver

management:
  endpoint:
    health:
      show-details: never
