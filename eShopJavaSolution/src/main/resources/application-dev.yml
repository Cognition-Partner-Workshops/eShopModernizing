# Dev profile — mirrors Web.Debug.config
# Uses H2 in-memory database instead of SQL Server LocalDB
spring:
  datasource:
    url: jdbc:h2:mem:catalogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        show_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  thymeleaf:
    cache: false

app:
  use-mock-data: true
  use-customization-data: false

logging:
  level:
    com.eshop.catalog: DEBUG
    org.springframework.web: DEBUG
